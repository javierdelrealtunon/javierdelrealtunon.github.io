<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datos metoceánicos</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    :root {
      --bg: #08101d;
      --panel: #12203a;
      --panel-2: #172844;
      --border: #2a3c5f;
      --text: #eaf1ff;
      --muted: #9db0d1;
      --accent: #66b3ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #08101d 0%, #0d1830 100%);
      color: var(--text);
    }

    .wrap {
      width: min(98vw, 1900px);
      margin: 0 auto;
      padding: 10px 14px 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .back {
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      font-size: 0.95rem;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.1rem, 3vw, 3.4rem);
      line-height: 1.05;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .left-panel {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .panel {
      background: rgba(18, 32, 58, 0.94);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--muted);
    }

    .status {
      margin-bottom: 12px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .search {
      width: 100%;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      outline: none;
    }

    .site-list {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 230px);
      overflow: auto;
      padding-right: 4px;
    }

    .site-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.15s ease;
    }

    .site-btn:hover,
    .site-btn.active {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .site-btn strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1rem;
    }

    .site-btn span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .empty {
      color: var(--muted);
      line-height: 1.6;
    }

    .main-panel {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    #map {
      width: 100%;
      height: calc(100vh - 170px);
      min-height: 700px;
      max-height: 1100px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #0b1220;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .metric .k {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 6px;
    }

    .metric .v {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
    }

    .leaflet-container {
      background: #0b1220;
    }

    .leaflet-control-layers {
      border-radius: 12px;
    }

    .leaflet-popup-content {
      margin: 14px 16px;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px;
    }

    .popup-shell {
      width: min(72vw, 980px);
    }

    .popup-head {
      margin-bottom: 12px;
    }

    .popup-title {
      font-size: 1rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 2px;
    }

    .popup-subtitle {
      font-size: 0.86rem;
      color: #667085;
    }

    .popup-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .popup-tab {
      border: 1px solid #cfd8ea;
      background: #f7f9fc;
      color: #24324a;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      line-height: 1;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .popup-tab:hover {
      border-color: #7cbdf7;
      background: #edf6ff;
    }

    .popup-tab.active {
      background: #dcedff;
      border-color: #66b3ff;
      color: #0d3f74;
      font-weight: 700;
    }

    .popup-frame-wrap {
      min-height: 380px;
    }

    .popup-frame {
      width: 100%;
      height: 380px;
      border: 0;
      border-radius: 12px;
      background: white;
      display: block;
    }

    .popup-empty {
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #667085;
      border: 1px dashed #cdd6e5;
      border-radius: 12px;
      padding: 18px;
      background: #fafcff;
    }

    .popup-note {
      margin-top: 10px;
      font-size: 0.84rem;
      color: #667085;
      line-height: 1.5;
    }

    .popup-note a {
      color: #0b63ce;
      text-decoration: none;
    }

    .popup-note a:hover {
      text-decoration: underline;
    }

    @media (min-width: 1700px) {
      .layout {
        grid-template-columns: 320px minmax(0, 1fr);
      }

      #map {
        height: calc(100vh - 155px);
      }

      .popup-shell {
        width: min(68vw, 1100px);
      }

      .popup-frame {
        height: 420px;
      }

      .popup-frame-wrap {
        min-height: 420px;
      }
    }

    @media (max-width: 1100px) {
      .wrap {
        width: min(99vw, 1400px);
        padding: 10px 10px 16px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .site-list {
        max-height: none;
      }

      #map {
        height: 68vh;
        min-height: 540px;
      }

      .popup-shell {
        width: min(84vw, 820px);
      }
    }

    @media (max-width: 720px) {
      .wrap {
        width: 100vw;
        padding: 8px;
      }

      h1 {
        font-size: clamp(1.8rem, 8vw, 2.6rem);
      }

      #map {
        height: 60vh;
        min-height: 420px;
      }

      .popup-shell {
        width: min(88vw, 720px);
      }

      .popup-frame {
        height: 280px;
      }

      .popup-frame-wrap {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <a class="back" href="../">← Volver al índice</a>
    </div>

    <header>
      <h1>Datos metoceánicos</h1>
    </header>

    <section class="layout">
      <aside class="left-panel">
        <section class="panel">
          <h2>Sitios disponibles</h2>
          <div id="status" class="status">Cargando datos...</div>
          <input id="searchInput" class="search" type="text" placeholder="Buscar sitio..." />
          <div id="siteList" class="site-list"></div>
        </section>
      </aside>

      <section class="main-panel">
        <div id="map"></div>

        <section class="panel">
          <div id="detail" class="empty">Selecciona un sitio de la lista o del mapa.</div>
        </section>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
  <script>
    const REQUIRED_KEYS = ["name", "lat", "lon"];
    const RESERVED_KEYS = [
      "id",
      "name",
      "lat",
      "lon",
      "region",
      "source",
      "widget_url",
      "widget_url_oleaje",
      "widget_url_viento",
      "widget_url_corriente",
      "widget_url_marea"
    ];

    const INITIAL_CENTER = [43.455, -2.90];
    const INITIAL_ZOOM = 10;

    // Sustituye estos dos valores por el servicio real
    const WMS_URL = "https://TU_SERVICIO_WMS";
    const WMS_LAYER_NAME = "NOMBRE_DE_LA_CAPA";

    let allSites = [];
    let filteredSites = [];
    let selectedId = null;
    let map;
    let markers = [];
    let cartoLayer;
    let orthoLayer;
    let layerControl;
    let kmlLayer;
    let nauticalWmsLayer;

    const statusEl = document.getElementById("status");
    const siteListEl = document.getElementById("siteList");
    const detailEl = document.getElementById("detail");
    const searchInput = document.getElementById("searchInput");

    function detectDelimiter(headerLine) {
      const semicolons = (headerLine.match(/;/g) || []).length;
      const commas = (headerLine.match(/,/g) || []).length;
      return semicolons > commas ? ";" : ",";
    }

    function splitCSVLine(line, delimiter) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === delimiter && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function slugify(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "");
    }

    function labelFromKey(key) {
      const labels = {
        name: "Nombre",
        lat: "Latitud",
        lon: "Longitud",
        region: "Región",
        source: "Fuente",
        widget_url_oleaje: "Widget oleaje",
        widget_url_viento: "Widget viento",
        widget_url_corriente: "Widget corriente",
        widget_url_marea: "Widget marea",
        url: "URL"
      };

      if (labels[key]) return labels[key];

      return key
        .replace(/_/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function parseCoordinate(value) {
      const raw = String(value ?? "").trim();
      if (!raw) return NaN;

      if (/[.,]/.test(raw)) {
        return parseFloat(raw.replace(",", "."));
      }

      const sign = raw.startsWith("-") ? -1 : 1;
      const digits = raw.replace(/^[+-]/, "");

      if (!/^\d+$/.test(digits)) {
        return NaN;
      }

      if (digits.length >= 3) {
        const whole = digits.slice(0, digits.length - 2);
        const decimal = digits.slice(-2);
        return sign * parseFloat(`${whole}.${decimal}`);
      }

      return sign * parseFloat(digits);
    }

    function parseCSV(text) {
      const cleanedText = text.replace(/^\uFEFF/, "").trim();
      const lines = cleanedText.split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) throw new Error("CSV vacío o sin filas de datos");

      const delimiter = detectDelimiter(lines[0]);
      const headers = splitCSVLine(lines[0], delimiter).map(h => h.trim());
      const missing = REQUIRED_KEYS.filter(k => !headers.includes(k));

      if (missing.length) {
        throw new Error("Faltan columnas obligatorias: " + missing.join(", "));
      }

      return lines.slice(1).map((line, idx) => {
        const values = splitCSVLine(line, delimiter);
        const raw = {};

        headers.forEach((header, i) => {
          raw[header] = (values[i] || "").trim();
        });

        const site = {
          id: raw.id || slugify(raw.name) || `site-${idx + 1}`,
          name: raw.name || `Sitio ${idx + 1}`,
          lat: parseCoordinate(raw.lat),
          lon: parseCoordinate(raw.lon),
          raw
        };

        if (Number.isNaN(site.lat) || Number.isNaN(site.lon)) return null;
        return site;
      }).filter(Boolean);
    }

    function getListSubtitle(site) {
      const candidates = ["region", "source"];
      const parts = candidates
        .map(k => site.raw[k])
        .filter(v => v && String(v).trim() !== "");
      return parts.join(" · ") || "Sin datos complementarios";
    }

    function getDisplayKeys(site) {
      return Object.keys(site.raw).filter(key => {
        if (RESERVED_KEYS.includes(key)) return false;
        const value = site.raw[key];
        return value !== undefined && value !== null && String(value).trim() !== "";
      });
    }

    function renderList() {
      siteListEl.innerHTML = "";

      if (!filteredSites.length) {
        siteListEl.innerHTML = '<div class="empty">No hay sitios que coincidan con la búsqueda.</div>';
        return;
      }

      filteredSites.forEach(site => {
        const btn = document.createElement("button");
        btn.className = "site-btn" + (site.id === selectedId ? " active" : "");
        btn.innerHTML = `
          <strong>${escapeHtml(site.name)}</strong>
          <span>${escapeHtml(getListSubtitle(site))}</span>
        `;
        btn.addEventListener("click", () => selectSite(site.id, true));
        siteListEl.appendChild(btn);
      });
    }

    function renderDetail() {
      const site = allSites.find(s => s.id === selectedId);

      if (!site) {
        detailEl.innerHTML = '<div class="empty">Selecciona un sitio de la lista o del mapa.</div>';
        return;
      }

      const displayKeys = getDisplayKeys(site);

      const metricsHtml = displayKeys.length
        ? `<div class="detail-grid">${
            displayKeys.map(key => `
              <div class="metric">
                <span class="k">${escapeHtml(labelFromKey(key))}</span>
                <span class="v">${escapeHtml(site.raw[key])}</span>
              </div>
            `).join("")
          }</div>`
        : "";

      detailEl.innerHTML = `
        <h3 style="margin:0 0 6px; font-size:1.3rem;">${escapeHtml(site.name)}</h3>
        <div style="color:#9db0d1;">Lat ${site.lat.toFixed(2)}, Lon ${site.lon.toFixed(2)}</div>
        ${metricsHtml}
      `;
    }

    function getPopupTabs(site) {
      return [
        {
          key: "oleaje",
          label: "Oleaje",
          url: site.raw.widget_url_oleaje || site.raw.widget_url || ""
        },
        {
          key: "viento",
          label: "Viento",
          url: site.raw.widget_url_viento || ""
        },
        {
          key: "corriente",
          label: "Corrientes",
          url: site.raw.widget_url_corriente || ""
        },
        {
          key: "marea",
          label: "Marea",
          url: site.raw.widget_url_marea || ""
        }
      ];
    }

    function createPopupId(siteId) {
      return `popup-${siteId}`;
    }

    function buildPopupHtml(site) {
      const tabs = getPopupTabs(site);
      const defaultTab = tabs.find(t => t.url) || tabs[0];
      const popupId = createPopupId(site.id);

      const tabsHtml = tabs.map(tab => `
        <button
          type="button"
          class="popup-tab ${tab.key === defaultTab.key ? "active" : ""}"
          onclick="switchPopupTab('${escapeAttr(popupId)}','${escapeAttr(tab.key)}')"
        >
          ${escapeHtml(tab.label)}
        </button>
      `).join("");

      const hiddenData = tabs.map(tab => `
        <span
          data-role="tab-data"
          data-tab="${escapeAttr(tab.key)}"
          data-label="${escapeAttr(tab.label)}"
          data-url="${escapeAttr(tab.url)}"
          hidden
        ></span>
      `).join("");

      return `
        <div class="popup-shell" id="${escapeAttr(popupId)}">
          <div class="popup-head">
            <div class="popup-title">${escapeHtml(site.name)}</div>
            <div class="popup-subtitle">${escapeHtml(getListSubtitle(site))}</div>
          </div>

          <div class="popup-tabs">
            ${tabsHtml}
          </div>

          ${hiddenData}

          <div class="popup-frame-wrap" data-role="content"></div>
        </div>
      `;
    }

    function renderPopupContent(containerId, tabKey) {
      const root = document.getElementById(containerId);
      if (!root) return;

      const tabData = Array.from(root.querySelectorAll('[data-role="tab-data"]'));
      const selected = tabData.find(el => el.dataset.tab === tabKey);
      const content = root.querySelector('[data-role="content"]');
      const buttons = Array.from(root.querySelectorAll('.popup-tab'));

      if (!selected || !content) return;

      buttons.forEach(btn => {
        const isActive = btn.getAttribute("onclick").includes(`'${tabKey}'`);
        btn.classList.toggle("active", isActive);
      });

      const label = selected.dataset.label || tabKey;
      const url = selected.dataset.url || "";

      if (url) {
        content.innerHTML = `
          <iframe
            class="popup-frame"
            src="${url}"
            title="${label}"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
          <div class="popup-note">
            Si el proveedor impide la carga embebida, abre el enlace externo:
            <a href="${url}" target="_blank" rel="noopener noreferrer">abrir ${label.toLowerCase()}</a>.
          </div>
        `;
      } else {
        content.innerHTML = `
          <div class="popup-empty">
            No hay widget disponible para ${label.toLowerCase()} en este punto.
          </div>
        `;
      }
    }

    window.switchPopupTab = function(containerId, tabKey) {
      renderPopupContent(containerId, tabKey);
    };

    function createNauticalWmsLayer() {
      if (!WMS_URL || WMS_URL.includes("TU_SERVICIO_WMS")) return null;
      if (!WMS_LAYER_NAME || WMS_LAYER_NAME === "NOMBRE_DE_LA_CAPA") return null;

      return L.tileLayer.wms(WMS_URL, {
        layers: WMS_LAYER_NAME,
        format: "image/png",
        transparent: true,
        version: "1.1.1",
        opacity: 0.65,
        attribution: "Carta náutica / batimetría WMS"
      });
    }

    function initMap() {
      cartoLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      });

      orthoLayer = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          maxZoom: 19,
          attribution: "Tiles &copy; Esri"
        }
      );

      nauticalWmsLayer = createNauticalWmsLayer();

      map = L.map("map", {
        center: INITIAL_CENTER,
        zoom: INITIAL_ZOOM,
        layers: [cartoLayer]
      });

      const baseLayers = {
        "Cartografía": cartoLayer,
        "Ortofoto": orthoLayer
      };

      const overlayLayers = {};

      if (nauticalWmsLayer) {
        overlayLayers["Carta náutica WMS"] = nauticalWmsLayer;
        // nauticalWmsLayer.addTo(map); // descomenta esta línea si quieres verla activada desde el inicio
      }

      layerControl = L.control.layers(baseLayers, overlayLayers, { collapsed: false }).addTo(map);
    }

    function loadKMLLayer() {
      kmlLayer = omnivore.kml("./bimep.kml")
        .on("ready", function () {
          kmlLayer.eachLayer(function (layer) {
            if (layer.setStyle) {
              layer.setStyle({
                color: "#ff7800",
                weight: 2,
                opacity: 0.9,
                fillColor: "#ffb347",
                fillOpacity: 0.2
              });
            }

            if (layer.feature && layer.feature.properties) {
              const props = layer.feature.properties;
              const nombre = props.name || "Elemento KML";
              layer.bindPopup(`<strong>${nombre}</strong>`);
            }
          });

          kmlLayer.addTo(map);
          layerControl.addOverlay(kmlLayer, "BiMEP KML");
        })
        .on("error", function (e) {
          console.error("Error cargando KML:", e);
        });
    }

    function renderMarkers() {
      markers.forEach(marker => map.removeLayer(marker));
      markers = [];

      if (!filteredSites.length) {
        map.setView(INITIAL_CENTER, INITIAL_ZOOM);
        return;
      }

      filteredSites.forEach(site => {
        const marker = L.marker([site.lat, site.lon]).addTo(map);

        marker.bindPopup(buildPopupHtml(site), {
          maxWidth: 1100,
          minWidth: 420,
          autoPan: true
        });

        marker.on("popupopen", () => {
          const tabs = getPopupTabs(site);
          const firstAvailable = tabs.find(t => t.url) || tabs[0];
          renderPopupContent(createPopupId(site.id), firstAvailable.key);
          setTimeout(() => marker.getPopup().update(), 0);
        });

        marker.on("click", () => {
          selectedId = site.id;
          renderList();
          renderDetail();
        });

        markers.push(marker);
      });

      const fixedBounds = L.latLngBounds(
        [43.20, -3.45],
        [43.55, -2.35]
      );
      map.fitBounds(fixedBounds, { padding: [24, 24] });
    }

    function applyFilter() {
      const q = searchInput.value.trim().toLowerCase();

      filteredSites = allSites.filter(site => {
        const haystack = Object.values(site.raw).join(" ").toLowerCase();
        return !q || haystack.includes(q);
      });

      if (!filteredSites.some(site => site.id === selectedId)) {
        selectedId = filteredSites.length ? filteredSites[0].id : null;
      }

      renderList();
      renderDetail();
      renderMarkers();
    }

    function selectSite(id, centerMap) {
      selectedId = id;
      renderList();
      renderDetail();

      if (centerMap && map) {
        const site = allSites.find(s => s.id === id);
        if (site) {
          map.setView([site.lat, site.lon], 11);
        }
      }
    }

    async function loadData() {
      try {
        const response = await fetch("./datos.csv", { cache: "no-store" });
        if (!response.ok) throw new Error("No se encontró datos.csv");

        const text = await response.text();
        allSites = parseCSV(text);

        if (!allSites.length) {
          throw new Error("No hay registros válidos");
        }

        statusEl.textContent = `Datos cargados desde datos.csv · ${allSites.length} sitios`;
      } catch (error) {
        statusEl.textContent = "Error al leer datos.csv: " + error.message;
        allSites = [];
      }

      filteredSites = [...allSites];
      selectedId = filteredSites.length ? filteredSites[0].id : null;

      renderList();
      renderDetail();
      renderMarkers();
    }

    searchInput.addEventListener("input", applyFilter);

    initMap();
    loadKMLLayer();
    loadData();
  </script>
</body>
</html>
