<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datos metoceánicos</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    :root {
      --bg: #08101d;
      --panel: #12203a;
      --panel-2: #172844;
      --border: #2a3c5f;
      --text: #eaf1ff;
      --muted: #9db0d1;
      --accent: #66b3ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #08101d 0%, #0d1830 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1450px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back {
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    .left-panel {
      display: grid;
      gap: 20px;
      align-content: start;
    }

    .panel {
      background: rgba(18, 32, 58, 0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      color: var(--muted);
    }

    .status {
      margin-bottom: 14px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .search {
      width: 100%;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 11px 12px;
      border-radius: 12px;
      outline: none;
    }

    .site-list {
      display: grid;
      gap: 10px;
      max-height: 65vh;
      overflow: auto;
      padding-right: 4px;
    }

    .site-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
    }

    .site-btn:hover,
    .site-btn.active {
      border-color: var(--accent);
    }

    .site-btn strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1rem;
    }

    .site-btn span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .empty {
      color: var(--muted);
      line-height: 1.6;
    }

    .map-panel {
      display: grid;
      grid-template-rows: 380px auto auto;
      gap: 20px;
    }

    #map {
      width: 100%;
      height: 380px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .metric {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .metric .k {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 6px;
    }

    .metric .v {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
    }

    .widget-frame {
      width: 100%;
      height: 520px;
      border: 0;
      border-radius: 14px;
      background: white;
    }

    .widget-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    a.source-link {
      color: #8fd3ff;
    }

    .leaflet-container {
      background: #0b1220;
    }

    .leaflet-control-layers {
      border-radius: 12px;
    }

    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .map-panel {
        grid-template-rows: 320px auto auto;
      }

      #map {
        height: 320px;
      }

      .site-list {
        max-height: none;
      }

      .widget-frame {
        height: 460px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <a class="back" href="../">← Volver al índice</a>
    </div>

    <header>
      <h1>Datos metoceánicos</h1>
    </header>

    <section class="layout">
      <aside class="left-panel">
        <section class="panel">
          <h2>Sitios disponibles</h2>
          <div id="status" class="status">Cargando datos...</div>
          <input id="searchInput" class="search" type="text" placeholder="Buscar sitio..." />
          <div id="siteList" class="site-list"></div>
        </section>
      </aside>

      <section class="map-panel">
        <div id="map"></div>

        <section class="panel">
          <div id="detail" class="empty">Selecciona un sitio de la lista o del mapa.</div>
        </section>

        <section class="panel">
          <h2>Oleaje (widget Portus)</h2>
          <div id="widgetContainer" class="empty">Selecciona un sitio con columna <strong>widget_url</strong> en el CSV.</div>
        </section>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const REQUIRED_KEYS = ["name", "lat", "lon"];
    const RESERVED_KEYS = ["id", "name", "lat", "lon", "widget_url", "region", "source"];

    const INITIAL_CENTER = [43.455, -2.90];
    const INITIAL_ZOOM = 10;

    let allSites = [];
    let filteredSites = [];
    let selectedId = null;
    let map;
    let markers = [];
    let cartoLayer;
    let orthoLayer;

    const statusEl = document.getElementById("status");
    const siteListEl = document.getElementById("siteList");
    const detailEl = document.getElementById("detail");
    const widgetContainerEl = document.getElementById("widgetContainer");
    const searchInput = document.getElementById("searchInput");

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function slugify(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "");
    }

    function labelFromKey(key) {
      const labels = {
        name: "Nombre",
        lat: "Latitud",
        lon: "Longitud",
        widget_url: "Widget",
        url: "URL"
      };

      if (labels[key]) return labels[key];

      return key
        .replace(/_/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) throw new Error("CSV vacío o sin filas de datos");

      const headers = splitCSVLine(lines[0]).map(h => h.trim());
      const missing = REQUIRED_KEYS.filter(k => !headers.includes(k));

      if (missing.length) {
        throw new Error("Faltan columnas obligatorias: " + missing.join(", "));
      }

      return lines.slice(1).map((line, idx) => {
        const values = splitCSVLine(line);
        const raw = {};

        headers.forEach((header, i) => {
          raw[header] = (values[i] || "").trim();
        });

        const site = {
          id: raw.id || slugify(raw.name) || `site-${idx + 1}`,
          name: raw.name || `Sitio ${idx + 1}`,
          lat: parseFloat(String(raw.lat).replace(",", ".")),
          lon: parseFloat(String(raw.lon).replace(",", ".")),
          raw
        };

        if (Number.isNaN(site.lat) || Number.isNaN(site.lon)) return null;
        return site;
      }).filter(Boolean);
    }

    function getListSubtitle(site) {
      const candidates = ["region", "source"];
      const parts = candidates
        .map(k => site.raw[k])
        .filter(v => v && String(v).trim() !== "");
      return parts.join(" · ") || "Sin datos complementarios";
    }

    function getDisplayKeys(site) {
      return Object.keys(site.raw).filter(key => {
        if (RESERVED_KEYS.includes(key)) return false;
        const value = site.raw[key];
        return value !== undefined && value !== null && String(value).trim() !== "";
      });
    }

    function renderList() {
      siteListEl.innerHTML = "";

      if (!filteredSites.length) {
        siteListEl.innerHTML = '<div class="empty">No hay sitios que coincidan con la búsqueda.</div>';
        return;
      }

      filteredSites.forEach(site => {
        const btn = document.createElement("button");
        btn.className = "site-btn" + (site.id === selectedId ? " active" : "");
        btn.innerHTML = `
          <strong>${escapeHtml(site.name)}</strong>
          <span>${escapeHtml(getListSubtitle(site))}</span>
        `;
        btn.addEventListener("click", () => selectSite(site.id, true));
        siteListEl.appendChild(btn);
      });
    }

    function renderDetail() {
      const site = allSites.find(s => s.id === selectedId);

      if (!site) {
        detailEl.innerHTML = '<div class="empty">Selecciona un sitio de la lista o del mapa.</div>';
        return;
      }

      const displayKeys = getDisplayKeys(site);

      const metricsHtml = displayKeys.length
        ? `<div class="detail-grid">${
            displayKeys.map(key => `
              <div class="metric">
                <span class="k">${escapeHtml(labelFromKey(key))}</span>
                <span class="v">${escapeHtml(site.raw[key])}</span>
              </div>
            `).join("")
          }</div>`
        : "";

      detailEl.innerHTML = `
        <h3 style="margin:0 0 6px; font-size:1.3rem;">${escapeHtml(site.name)}</h3>
        <div style="color:#9db0d1;">Lat ${site.lat}, Lon ${site.lon}</div>
        ${metricsHtml}
      `;
    }

    function renderWidget() {
      const site = allSites.find(s => s.id === selectedId);

      if (!site) {
        widgetContainerEl.innerHTML = '<div class="empty">Selecciona un sitio.</div>';
        return;
      }

      const widgetUrl = site.raw.widget_url;

      if (!widgetUrl) {
        widgetContainerEl.innerHTML = `
          <div class="empty">
            Este sitio no tiene <strong>widget_url</strong> definido en el CSV.
          </div>
        `;
        return;
      }

      widgetContainerEl.innerHTML = `
        <iframe
          class="widget-frame"
          src="${escapeAttr(widgetUrl)}"
          title="Widget de oleaje"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
        <div class="widget-note">
          Si el proveedor impide la carga embebida, abre el enlace externo:
          <a class="source-link" href="${escapeAttr(widgetUrl)}" target="_blank" rel="noopener noreferrer">abrir widget</a>.
        </div>
      `;
    }

    function initMap() {
      cartoLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      });

      orthoLayer = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          maxZoom: 19,
          attribution: "Tiles &copy; Esri"
        }
      );

      map = L.map("map", {
        center: INITIAL_CENTER,
        zoom: INITIAL_ZOOM,
        layers: [cartoLayer]
      });

      const baseLayers = {
        "Cartografía": cartoLayer,
        "Ortofoto": orthoLayer
      };

      L.control.layers(baseLayers, null, { collapsed: false }).addTo(map);
    }

    function renderMarkers() {
      markers.forEach(marker => map.removeLayer(marker));
      markers = [];

      if (!filteredSites.length) {
        map.setView(INITIAL_CENTER, INITIAL_ZOOM);
        return;
      }

      filteredSites.forEach(site => {
        const marker = L.marker([site.lat, site.lon]).addTo(map);
        marker.bindPopup(`
          <div>
            <strong>${escapeHtml(site.name)}</strong><br>
            ${escapeHtml(getListSubtitle(site))}
          </div>
        `);
        marker.on("click", () => selectSite(site.id, false));
        markers.push(marker);
      });

      // Mantener un encuadre útil y estable para BiMEP
      const fixedBounds = L.latLngBounds(
        [43.33, -3.18], // SW
        [43.57, -2.60]  // NE
      );
      map.fitBounds(fixedBounds, { padding: [20, 20] });
    }

    function applyFilter() {
      const q = searchInput.value.trim().toLowerCase();

      filteredSites = allSites.filter(site => {
        const haystack = Object.values(site.raw).join(" ").toLowerCase();
        return !q || haystack.includes(q);
      });

      if (!filteredSites.some(site => site.id === selectedId)) {
        selectedId = filteredSites.length ? filteredSites[0].id : null;
      }

      renderList();
      renderDetail();
      renderWidget();
      renderMarkers();
    }

    function selectSite(id, centerMap) {
      selectedId = id;
      renderList();
      renderDetail();
      renderWidget();

      if (centerMap && map) {
        const site = allSites.find(s => s.id === id);
        if (site) {
          map.setView([site.lat, site.lon], 11);
        }
      }
    }

    async function loadData() {
      try {
        const response = await fetch("./datos.csv", { cache: "no-store" });
        if (!response.ok) throw new Error("No se encontró datos.csv");

        const text = await response.text();
        allSites = parseCSV(text);

        if (!allSites.length) {
          throw new Error("No hay registros válidos");
        }

        statusEl.textContent = `Datos cargados desde datos.csv · ${allSites.length} sitios`;
      } catch (error) {
        statusEl.textContent = "Error al leer datos.csv: " + error.message;
        allSites = [];
      }

      filteredSites = [...allSites];
      selectedId = filteredSites.length ? filteredSites[0].id : null;

      renderList();
      renderDetail();
      renderWidget();
      renderMarkers();
    }

    searchInput.addEventListener("input", applyFilter);

    initMap();
    loadData();
  </script>
</body>
</html>
