<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Proyecto de IA</title>
    <style>
        /* Aquí va el diseño (CSS) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 {
            color: #1a73e8;
        }

        /* Esta es la "caja" donde vivirá el bot */
        #contenedor-chatbot {
            background-color: white;
            width: 100%;
            max-width: 450px;
            height: 500px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            border: 1px solid #ddd;
        }

        .mensaje-temporal {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Bienvenido a mi Web</h1>
    <p>Estamos construyendo algo genial con Inteligencia Artificial.</p>

    <div id="contenedor-chatbot">
        <p class="mensaje-temporal">🚧 Aquí instalaremos el cerebro de Gemini pronto 🚧</p>
    </div>

</body>
</html>
