<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spots de pesca submarina | Javier del Real Tuñón</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spots SDC" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    /* ── Botón flotante añadir ── */
    #fab-add {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1100;
      background: #5baaff;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(91,170,255,0.5);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .2s, transform .15s;
    }
    #fab-add:hover { background: #3d96f5; transform: translateX(-50%) scale(1.04); }

    /* ── Modal overlay ── */
    #add-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.55);
      align-items: flex-end;
      justify-content: center;
    }
    #add-modal.open { display: flex; }

    /* ── Modal panel ── */
    .modal-panel {
      background: #1a2035;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 520px;
      padding: 28px 24px 36px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    .modal-header h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #e8f0fe;
      margin: 0;
    }
    #form-close {
      background: none;
      border: none;
      color: #8899bb;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    /* ── Campos del formulario ── */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      color: #8899bb;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: #111827;
      border: 1px solid #2a3550;
      border-radius: 10px;
      padding: 11px 14px;
      color: #e8f0fe;
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem;
      box-sizing: border-box;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #5baaff; }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-group select option { background: #1a2035; }

    /* ── Fila coordenadas + GPS ── */
    .coords-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .coords-row .form-group { flex: 1; margin-bottom: 0; }
    #btn-gps {
      background: #2a3550;
      border: 1px solid #3a4f70;
      border-radius: 10px;
      color: #5baaff;
      padding: 11px 14px;
      cursor: pointer;
      font-size: .85rem;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
      transition: background .2s;
      flex-shrink: 0;
    }
    #btn-gps:hover { background: #334060; }
    #gps-status {
      display: block;
      font-size: .78rem;
      color: #8899bb;
      margin-top: 6px;
      min-height: 18px;
    }

    /* ── Botón guardar ── */
    .btn-save {
      width: 100%;
      background: #5baaff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
    }
    .btn-save:hover { background: #3d96f5; }
    .btn-save:disabled { background: #2a3550; color: #5566aa; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <a class="back-link" href="../">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Volver
      </a>
      <div class="eyebrow">Pesca submarina</div>
      <h1>Mapa de <em>spots</em></h1>
      <p class="lead">Localizaciones georreferenciadas para la pesca submarina: puntos de acceso, zonas de pesca, aparcamiento y galería de imágenes.</p>
    </div>

    <!-- Layer toggles -->
    <div class="layers-section">
      <div class="section-label">Capas</div>

      <div class="layer-list" id="layer-list">

        <label class="layer-item" id="layer-sitios">
          <span class="layer-dot" style="background:#5baaff;box-shadow:0 0 6px rgba(91,170,255,0.6)"></span>
          <span class="layer-name">Sitios de pesca</span>
          <input type="checkbox" checked data-layer="sitios" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>

        <label class="layer-item" id="layer-parking">
          <span class="layer-dot" style="background:#62f0cf;box-shadow:0 0 6px rgba(98,240,207,0.6)"></span>
          <span class="layer-name">Aparcamiento</span>
          <input type="checkbox" checked data-layer="parking" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>

        <label class="layer-item" id="layer-fotos">
          <span class="layer-dot" style="background:#f0b962;box-shadow:0 0 6px rgba(240,185,98,0.6)"></span>
          <span class="layer-name">Fotos</span>
          <input type="checkbox" checked data-layer="fotos" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>

        <label class="layer-item" id="layer-entrada">
          <span class="layer-dot" style="background:#f06262;box-shadow:0 0 6px rgba(240,98,98,0.6)"></span>
          <span class="layer-name">Punto de entrada</span>
          <input type="checkbox" checked data-layer="entrada" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>

      </div>
    </div>

    <!-- Feature info panel -->
    <div class="info-panel" id="info-panel">
      <div class="info-empty" id="info-empty">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.4" opacity="0.3"/><path d="M14 9v6M14 18v1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span>Haz clic en un marcador<br>para ver sus detalles</span>
      </div>
      <div class="info-content" id="info-content" style="display:none">
        <div class="info-tag" id="info-tag"></div>
        <div class="info-name" id="info-name"></div>
        <div class="info-desc" id="info-desc"></div>
      </div>
    </div>

  </aside>

  <!-- ── Map ── -->
  <div id="map"></div>

  <!-- ── Sidebar toggle (mobile) ── -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir panel">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 5h12M3 9h8M3 13h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>

  <!-- ── Botón flotante añadir sitio ── -->
  <button id="fab-add">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Añadir sitio
  </button>

  <!-- ── Modal formulario ── -->
  <div id="add-modal">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>📍 Añadir nuevo sitio</h2>
        <button id="form-close">✕</button>
      </div>

      <form id="add-form" autocomplete="off">

        <div class="form-group">
          <label for="form-nombre">Nombre del sitio *</label>
          <input id="form-nombre" type="text" placeholder="Ej: Punta del Castro" required />
        </div>

        <div class="form-group">
          <label for="form-tipo">Tipo *</label>
          <select id="form-tipo" required>
            <option value="">— Selecciona —</option>
            <option value="Sitio de pesca">🤿 Sitio de pesca</option>
            <option value="Aparcamiento">🅿️ Aparcamiento</option>
            <option value="Punto de entrada">🚩 Punto de entrada</option>
          </select>
        </div>

        <div class="form-group">
          <label>Coordenadas *</label>
          <div class="coords-row">
            <div class="form-group">
              <input id="form-lat" type="number" step="any" placeholder="Latitud" required />
            </div>
            <div class="form-group">
              <input id="form-lng" type="number" step="any" placeholder="Longitud" required />
            </div>
            <button type="button" id="btn-gps">📡 GPS</button>
          </div>
          <span id="gps-status"></span>
        </div>

        <div class="form-group">
          <label for="form-notas">Notas</label>
          <textarea id="form-notas" placeholder="Fondo, corrientes, acceso..."></textarea>
        </div>

        <div class="form-group">
          <label for="form-autor">Tu nombre</label>
          <input id="form-autor" type="text" placeholder="Ej: Javier" />
        </div>

        <button type="submit" class="btn-save">Guardar sitio</button>

      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/spearfishing/sw.js')
        .then(() => console.log('[PWA] Service worker registrado'))
        .catch(e => console.warn('[PWA] Error:', e));
    }
  </script>
</body>
</html>
