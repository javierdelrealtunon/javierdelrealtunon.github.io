<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spots de pesca submarina | Javier del Real Tuñón</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Omnivore (KML parser) -->
  <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <a class="back-link" href="../">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Volver
      </a>
      <div class="eyebrow">Pesca submarina</div>
      <h1>Mapa de <em>spots</em></h1>
      <p class="lead">Localizaciones georreferenciadas para la pesca submarina: puntos de acceso, zonas de pesca, aparcamiento y galería de imágenes.</p>
    </div>

    <!-- Layer toggles -->
    <div class="layers-section">
      <div class="section-label">Capas</div>

      <div class="layer-list" id="layer-list">

        <label class="layer-item" id="layer-sitios">
          <span class="layer-dot" style="background:#5baaff;box-shadow:0 0 6px rgba(91,170,255,0.6)"></span>
          <span class="layer-name">Sitios de pesca</span>
          <input type="checkbox" checked data-layer="sitios" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>

        <label class="layer-item" id="layer-parking">
          <span class="layer-dot" style="background:#62f0cf;box-shadow:0 0 6px rgba(98,240,207,0.6)"></span>
          <span class="layer-name">Aparcamiento</span>
          <input type="checkbox" checked data-layer="parking" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>

        <label class="layer-item" id="layer-fotos">
          <span class="layer-dot" style="background:#f0b962;box-shadow:0 0 6px rgba(240,185,98,0.6)"></span>
          <span class="layer-name">Fotos</span>
          <input type="checkbox" checked data-layer="fotos" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>

        <label class="layer-item" id="layer-entrada">
          <span class="layer-dot" style="background:#f06262;box-shadow:0 0 6px rgba(240,98,98,0.6)"></span>
          <span class="layer-name">Punto de entrada</span>
          <input type="checkbox" checked data-layer="entrada" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>

      </div>
    </div>

    <!-- Feature info panel -->
    <div class="info-panel" id="info-panel">
      <div class="info-empty" id="info-empty">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.4" opacity="0.3"/><path d="M14 9v6M14 18v1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span>Haz clic en un marcador<br>para ver sus detalles</span>
      </div>
      <div class="info-content" id="info-content" style="display:none">
        <div class="info-tag" id="info-tag"></div>
        <div class="info-name" id="info-name"></div>
        <div class="info-desc" id="info-desc"></div>
      </div>
    </div>

  </aside>

  <!-- ── Map ── -->
  <div id="map"></div>

  <!-- ── Sidebar toggle (mobile) ── -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir panel">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 5h12M3 9h8M3 13h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
